name: CI/CD Pipeline

on:
  release:
    types: [ published ]
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - run: pip install -r requirements.txt

      - name: Lint code
        run: ruff check app/ tests/ --fix


  test:
    name: Run Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - run: pip install -r requirements.txt

      - name: Run coverage test
        run: pytest --cov=app --cov-report=html --cov-fail-under=80

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' || github.event_name == 'release'
    permissions:
      contents: read
      actions: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - run: pip install -r requirements.txt

      - name: Build docker image
        run: docker build -t fastapi-gitops-starter .

      - name: Add tag image on release
        if: github.event_name == 'release'
        run: |
          docker tag fastapi-gitops-starter:latest \
          fastapi-gitops-starter:${{ github.ref_name }}

      - name: Push Docker image
        run: |
          docker push fastapi-gitops-starter:latest
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            docker push fastapi-gitops-starter:${GITHUB_REF_NAME}
          fi

